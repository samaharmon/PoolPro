<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoolPro Home</title>
  <link rel="stylesheet" href="Main/home.css">
</head>
<body class="home-body">
  <header class="home-header">
    <img src="Images/Logos/logo.png" alt="PoolPro logo" class="home-logo" />
    <h1 class="home-title">PoolPro</h1>
  </header>

  <main class="home-main">
    <hr class="home-divider">

    <nav class="home-menu">
      <button class="home-menu-item" data-target="chem">
        <span>Log Pool Chemistry</span>
      </button>
      <button class="home-menu-item" data-target="training">
        <span>Sign Up for Training</span>
      </button>
      <button class="home-menu-item" data-target="supervisor">
        <span>Supervisor Tools</span>
      </button>
    </nav>
  </main>

  <!-- Login modal -->
  <div id="homeLoginModal" class="modal">
    <div class="modal-content home-login-modal">
      <button class="close" id="homeLoginClose">&times;</button>
      <h2>Sign in</h2>

      <!-- Lifeguard / Supervisor role toggle -->
      <div class="home-role-toggle" id="roleToggle">
        <button class="theme-toggle-option active" data-role="lifeguard">Lifeguard</button>
        <button class="theme-toggle-option" data-role="supervisor">Supervisor</button>
      </div>

      <form id="homeLoginForm">
        <div class="form-group">
          <label id="homeUsernameLabel" for="homeUsernameInput">Username</label>
          <input type="text" id="homeUsernameInput" autocomplete="username">
        </div>
        <div class="form-group" id="homePasswordGroup">
          <label id="homePasswordLabel" for="homePasswordInput">Password</label>
          <input type="password" id="homePasswordInput" autocomplete="current-password">
        </div>

        <p class="form-message" id="homeLoginMessage"></p>

        <div class="home-form-actions">
          <button type="submit" class="submit-btn" id="homeLoginSubmit">Continue</button>
          <button type="button" class="submit-btn secondary-btn" id="homeShowCreateAccountBtn">Create Account</button>
        </div>
      </form>

      <form id="homeCreateAccountForm" class="hidden">
        <div class="home-form-grid">
          <div class="form-group">
            <label for="homeCreateUsernameInput">Username</label>
            <input type="text" id="homeCreateUsernameInput" autocomplete="username">
          </div>
          <div class="form-group">
            <label for="homeCreateFirstNameInput">Preferred First Name</label>
            <input type="text" id="homeCreateFirstNameInput" autocomplete="given-name">
          </div>
          <div class="form-group">
            <label for="homeCreateLastNameInput">Last Name</label>
            <input type="text" id="homeCreateLastNameInput" autocomplete="family-name">
          </div>
          <div class="form-group">
            <label for="homeCreateEmailInput">Email</label>
            <input type="email" id="homeCreateEmailInput" autocomplete="email">
          </div>
          <div class="form-group">
            <label for="homeCreatePhoneInput">Phone Number</label>
            <input type="tel" id="homeCreatePhoneInput" autocomplete="tel">
          </div>
          <div class="form-group">
            <label for="homeCreatePoolInput">Home Facility</label>
            <select id="homeCreatePoolInput">
              <option value="">Select facility</option>
            </select>
          </div>
          <div class="form-group">
            <label for="homeCreatePasswordInput">Password</label>
            <input type="password" id="homeCreatePasswordInput" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label for="homeCreateConfirmPasswordInput">Confirm Password</label>
            <input type="password" id="homeCreateConfirmPasswordInput" autocomplete="new-password">
          </div>
        </div>

        <p class="form-message" id="homeCreateAccountMessage"></p>

        <div class="home-form-actions">
          <button type="submit" class="submit-btn" id="homeCreateAccountSubmit">Create Account</button>
          <button type="button" class="submit-btn secondary-btn" id="homeBackToLoginBtn">Back to Sign In</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="Main/home.js"></script>
</body>
</html>
